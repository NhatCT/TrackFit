hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.showSql=true
hibernate.connection.driverClass=com.mysql.cj.jdbc.Driver
hibernate.hbm2ddl.auto=update

hibernate.connection.url=${DB_URL:jdbc:mysql://mysql:3306/trackfitdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
hibernate.connection.username=${DB_USERNAME:trackfit}
hibernate.connection.password=${DB_PASSWORD:Abc123}

logging.level.org.springframework.transaction=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.springframework.orm.hibernate5=DEBUG

spring.messages.basename=messages

ai.reco.url=${AI_RECO_URL:http://ai:8000}

ai.reco.enabled=true
ai.http.connect-timeout-ms=5000
ai.http.read-timeout-ms=30000

ai.http.retry.attempts=3
ai.http.retry.backoff-ms=400

ai.advice.enabled=true
ai.advice.top=3
ai.advice.withinDays=1

# Redis configuration
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}
redis.password=${REDIS_PASSWORD:}

# Chat quota (Free tier) — enforced via Redis
chat.free.daily-limit=3

# Kafka (optional: bật khi chạy docker-compose với service kafka)
kafka.enabled=${KAFKA_ENABLED:false}
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.consumer.group-id=gutim-ws-bridge

# CORS Allowed Origins
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

